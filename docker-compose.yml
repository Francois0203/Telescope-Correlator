services:
  correlator:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: telescope-correlator:latest
    container_name: telescope-correlator
    volumes:
      - ./workspace:/workspace
    stdin_open: true
    tty: true
    command: ["python", "-m", "correlator"]

  test:
    image: telescope-correlator:latest
    depends_on:
      - correlator
    container_name: telescope-correlator-test
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["pytest", "tests_harness/", "-v", "--tb=short"]
    environment:
      - PYTHONPATH=/workspace/app/src:/usr/local/lib/python3.11/site-packages
